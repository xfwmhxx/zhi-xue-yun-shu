<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>杏林·灵枢手 | 手势控制Unity医学展示</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- MediaPipe 核心库 -->
    <script src="./mediapipe/hands.js"></script>
    <script src="./mediapipe/drawing_utils.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none; /* 提升拖拽体验，但无伤大雅 */
      }

      :root {
        --apricot-glass: rgba(253, 245, 230, 0.82);
        --apricot-strong: rgba(250, 240, 220, 0.94);
        --bronze-border: #b87c4f;
        --bronze-dark: #7a4a2c;
        --bronze-light: #d9aa7a;
        --seal-red: #bc5a4c;
        --text-deep: #3e2a24;
        --text-soft: #6f4e3c;
        --shadow-soft: 0 20px 35px -12px rgba(74, 52, 46, 0.2), 0 0 0 1px rgba(184, 124, 79, 0.15);
      }

      html,
      body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: 100% !important;
        overflow: hidden !important; /* 核心：彻底切断滚动条 */
        position: fixed; /* 锁定视口 */
        background: #faf0e1;
      }

      /* unity 画布容器 */
      /* 2. 容器必须也是 fixed，且 inset: 0 */
      #unity-container {
        position: fixed;
        inset: 0; /* 等同于 top:0, left:0, right:0, bottom:0 */
        width: 100vw !important;
        height: 100vh !important;
        background: #ecdcc8;
        z-index: 1;
        overflow: hidden;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block; /* 核心：消除 inline 元素的基线间隙 */
        vertical-align: bottom; /* 辅助：确保底部对齐 */
        position: absolute; /* 彻底脱离文档流，不参与父级高度计算 */
        top: 0;
        left: 0;
        object-fit: contain;
      }

      /* ----- 毛玻璃核心样式 (杏林美学) ----- */
      .glass-card {
        background: var(--apricot-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1.5px solid var(--bronze-border);
        border-radius: 28px;
        box-shadow: var(--shadow-soft);
        transition: all 0.2s ease;
      }

      .glass-card-solid {
        background: var(--apricot-strong);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1.5px solid var(--bronze-border);
        border-radius: 28px;
        box-shadow: 0 12px 28px rgba(74, 52, 46, 0.12);
      }

      /* 主控制面板（左） */
      #controls {
        position: fixed;
        top: 80px;
        left: 20px;
        width: 460px;
        padding: 1.25rem 1.3rem;
        z-index: 20;
        background: var(--apricot-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1.5px solid var(--bronze-border);
        border-radius: 32px;
        box-shadow: var(--shadow-soft);
      }

      /* 右侧边栏容器 */
      #right-sidebar {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 340px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        z-index: 20;
        overflow-y: auto;
      }

      /* 右侧边栏滚动条美化 */
      #right-sidebar::-webkit-scrollbar {
        width: 5px;
      }
      #right-sidebar::-webkit-scrollbar-track {
        background: rgba(184, 124, 79, 0.12);
        border-radius: 10px;
      }
      #right-sidebar::-webkit-scrollbar-thumb {
        background: var(--bronze-border);
        border-radius: 10px;
      }

      /* 摄像头预览毛玻璃 */
      .preview-wrap {
        background: rgba(253, 245, 230, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 28px;
        border: 1.5px solid var(--bronze-border);
        overflow: hidden;
        box-shadow: 0 12px 24px rgba(74, 52, 46, 0.12);
      }

      /* 模型信息面板 */
      #model-info-panel {
        background: rgba(253, 245, 230, 0.82);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 28px;
        border: 1.5px solid var(--bronze-border);
        overflow: hidden;
        box-shadow: var(--shadow-soft);
      }

      /* 底部功能栏 - 灵动杏林条 */
      #bottom-action-bar {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        padding: 12px 24px;
        background: rgba(253, 245, 230, 0.78);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1.5px solid var(--bronze-border);
        border-radius: 80px;
        box-shadow: 0 12px 28px rgba(74, 52, 46, 0.15);
        z-index: 25;
      }

      /* 统一按钮风格 */
      button,
      .bottom-action-btn {
        font-family: inherit;
        font-weight: 500;
        transition: all 0.2s;
      }

      button {
        background: rgba(253, 245, 230, 0.9);
        border: 1.5px solid var(--bronze-border);
        border-radius: 40px;
        padding: 8px 16px;
        font-size: 13px;
        color: var(--text-deep);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      }

      button i {
        font-size: 14px;
        color: var(--bronze-dark);
      }

      button:hover {
        background: var(--bronze-border);
        border-color: var(--bronze-dark);
        color: white;
        transform: translateY(-2px);
      }
      button:hover i {
        color: white;
      }

      button.primary {
        background: #c99262;
        border-color: #7a4a2c;
        color: white;
      }
      button.primary i {
        color: #fff3e6;
      }

      button.secondary {
        background: rgba(250, 240, 225, 0.9);
      }

      /* 模式切换器 */
      .mode-selector {
        display: flex;
        gap: 12px;
        margin: 16px 0 12px;
        background: rgba(184, 124, 79, 0.1);
        padding: 6px;
        border-radius: 60px;
      }

      .mode-option {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        border-radius: 48px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
        background: transparent;
        color: var(--text-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .mode-option i {
        font-size: 1.1rem;
      }

      .mode-option.active {
        background: #c28a5c;
        color: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      }
      .mode-option.active i {
        color: white;
      }

      /* 状态文字等 */
      .status-line {
        font-size: 13px;
        margin: 8px 0;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-soft);
      }

      .status-line i {
        width: 20px;
        color: #b87c4f;
      }

      .hint {
        font-size: 12px;
        background: rgba(184, 124, 79, 0.12);
        padding: 10px 12px;
        border-radius: 20px;
        margin: 12px 0 8px;
        border-left: 4px solid #c99262;
      }

      .mouse-tip {
        background: rgba(188, 90, 76, 0.08);
        border-radius: 20px;
        padding: 10px;
        margin-top: 10px;
        font-size: 12px;
        border-left: 3px solid var(--seal-red);
      }

      #message-box {
        margin-top: 14px;
        border-radius: 22px;
        background: rgba(253, 245, 230, 0.7);
        backdrop-filter: blur(4px);
        border: 1px solid var(--bronze-border);
        padding: 10px;
        max-height: 160px;
        overflow-y: auto;
        font-size: 12px;
      }

      #message-content > div {
        padding: 6px 4px;
        border-bottom: 1px solid rgba(122, 74, 44, 0.2);
        font-size: 12px;
      }

      /* 预览区视频 */
      .preview-inner {
        position: relative;
        background: #e9d9c4;
      }
      .input_video,
      .output_canvas {
        width: 100%;
        display: block;
        transform: rotateY(180deg);
      }
      .output_canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .preview-footer {
        padding: 10px;
        font-size: 12px;
        text-align: center;
        background: rgba(253, 245, 230, 0.9);
        border-top: 1px solid var(--bronze-border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      /* 自定义光标 (手势光标) */
      #gesture-cursor {
        position: fixed;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(188, 90, 76, 0.25);
        border: 2px solid var(--seal-red);
        box-shadow: 0 0 12px rgba(188, 90, 76, 0.3);
        backdrop-filter: blur(4px);
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        display: none;
      }
      #gesture-cursor.active {
        display: block;
      }
      #gesture-cursor::after {
        content: '✋';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 18px;
        color: var(--seal-red);
        opacity: 0.7;
      }

      /* 命令浮层 */
      #command-overlay {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        min-width: 320px;
        background: rgba(253, 245, 230, 0.94);
        backdrop-filter: blur(20px);
        border: 1.5px solid var(--bronze-border);
        border-radius: 32px;
        padding: 16px 24px;
        text-align: center;
        z-index: 30;
        display: none;
        box-shadow: var(--shadow-soft);
      }
      #command-overlay.active {
        display: block;
      }
      #command-overlay-title {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 6px;
        color: var(--bronze-dark);
      }
      #command-overlay-text {
        font-size: 0.8rem;
      }

      .model-info-title {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: #7a4a2c;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .model-info-item {
        background: rgba(255, 245, 235, 0.6);
        border-radius: 20px;
        padding: 12px;
        margin-bottom: 10px;
        border: 1px solid rgba(184, 124, 79, 0.25);
      }
      .model-info-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9b6a48;
        margin-bottom: 4px;
      }
      .model-info-value {
        font-size: 14px;
        font-weight: 500;
      }

      /* 滚动条杏色 */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f0e2d0;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: #c28a5c;
        border-radius: 10px;
      }

      /* 响应式 */
      @media (max-width: 1000px) {
        #controls {
          width: 380px;
          padding: 1rem;
        }
        #right-sidebar {
          width: 290px;
        }
        .bottom-action-btn {
          padding: 8px 16px;
          font-size: 12px;
          gap: 6px;
        }
      }
      @media (max-width: 750px) {
        #controls {
          width: calc(100% - 32px);
          left: 16px;
          top: 12px;
        }
        #right-sidebar {
          width: calc(100% - 32px);
          right: 16px;
          top: auto;
          bottom: 100px;
          flex-direction: row;
          gap: 12px;
        }
        #model-info-panel {
          max-height: 240px;
        }
        .preview-wrap {
          width: 50%;
        }
        #bottom-action-bar {
          gap: 12px;
          padding: 8px 18px;
          bottom: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div
        id="loading-overlay"
        style="
          position: absolute;
          inset: 0;
          background: rgba(253, 245, 230, 0.9);
          backdrop-filter: blur(12px);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 100;
          border-radius: 0;
        "
      >
        <div style="font-size: 1.2rem"><i class="fas fa-leaf"></i> 杏林·灵枢加载中</div>
        <div
          style="
            width: 260px;
            height: 8px;
            background: #e1cbb4;
            border-radius: 10px;
            margin-top: 15px;
          "
        >
          <div
            id="progress-fill"
            style="width: 0%; height: 100%; background: #c28a5c; border-radius: 10px"
          ></div>
        </div>
      </div>
    </div>

    <div id="controls" class="glass-card">
      <h3
        style="
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 12px;
          font-size: 1.35rem;
        "
      >
        <i class="fas fa-hand-peace fa-fw" style="color: #b87c4f"></i> 手势灵枢台
        <span
          id="mode-badge"
          style="
            background: #bc5a4c;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 40px;
            color: white;
          "
          >手势模式</span
        >
      </h3>

      <div class="mode-selector">
        <div id="mode-hand" class="mode-option active" onclick="setInputMode('hand')">
          <i class="fas fa-hand-peace"></i> 手势识别
        </div>
        <div id="mode-mouse" class="mode-option" onclick="setInputMode('mouse')">
          <i class="fas fa-mouse-pointer"></i> 鼠标模拟
        </div>
      </div>

      <div class="status-line">
        <i class="fas fa-cube"></i> Unity 状态：<span id="unity-status">加载中</span>
      </div>
      <div class="status-line">
        <i class="fas fa-exchange-alt"></i> 输入源：<span id="input-source-status">手势识别</span>
      </div>
      <div class="status-line">
        <i class="fas fa-video"></i> 摄像头：<span id="video-status">未开启</span>
      </div>
      <div class="status-line">
        <i class="fas fa-brain"></i> 识别状态：<span id="detect-status">等待开始</span>
      </div>
      <div class="status-line">
        <i class="fas fa-gamepad"></i> 控制模式：<span id="command-status">自由模式</span>
      </div>
      <div class="status-line">
        <i class="fas fa-arrows-alt-v"></i> 摄像机偏移：<span id="camera-offset-status">0%</span>
      </div>

      <div class="btn-row" style="display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 6px">
        <button onclick="startCameraMode()" id="btnCamera">
          <i class="fas fa-camera"></i> 打开摄像头
        </button>
        <button onclick="stopCameraMode()" id="btnStopCam">
          <i class="fas fa-stop-circle"></i> 关闭
        </button>
        <button onclick="startProcessing()" id="btnStartRec">
          <i class="fas fa-play"></i> 开始识别
        </button>
        <button onclick="stopProcessing()" id="btnStopRec">
          <i class="fas fa-pause"></i> 停止识别
        </button>
        <button onclick="resetUnityView()"><i class="fas fa-sync-alt"></i> 重置模型</button>
      </div>

      <div class="mouse-tip" id="mouse-tip-area" style="display: none">
        <i class="fas fa-computer-mouse"></i> <strong>鼠标模式说明</strong><br />
        • 左键拖拽 → 旋转模型<br />• 左键单击 → 选择模型并显示信息<br />• 滚轮缩放联动摄像机偏移
      </div>

      <div class="hint">
        <i class="fas fa-info-circle"></i>
        杏林手势：单手移动旋转，双手开合缩放+垂直偏移。双拳长按切换点击模式。
      </div>
      <div id="message-box"><div id="message-content"></div></div>
    </div>

    <div id="right-sidebar">
      <div class="preview-wrap">
        <div class="preview-inner">
          <video class="input_video" playsinline muted autoplay></video>
          <canvas class="output_canvas"></canvas>
        </div>
        <div class="preview-footer">
          <i class="fas fa-hand-holding-heart"></i> 手部骨架·杏林望诊
        </div>
      </div>
      <div id="model-info-panel">
        <div
          id="model-info-header"
          style="
            padding: 14px 18px;
            font-weight: bold;
            background: rgba(239, 221, 196, 0.6);
            border-bottom: 1px solid #b87c4f;
          "
        >
          <i class="fas fa-notes-medical"></i> 经络腧穴·智析
        </div>
        <div id="model-info-content" style="padding: 16px; max-height: 280px; overflow-y: auto">
          <div class="model-info-empty">
            <i class="fas fa-hand-point-right"></i> 等待模型信息，点击Unity模型后显示详情
          </div>
        </div>
      </div>
    </div>

    <div id="gesture-cursor"></div>
    <div id="command-overlay">
      <div id="command-overlay-title"><i class="fas fa-hand-fist"></i> 点击模式</div>
      <div id="command-overlay-text">双拳保持进入点选，掌心移动光标</div>
    </div>

    <div id="bottom-action-bar">
      <button class="bottom-action-btn" onclick="showAcupointMode()">
        <i class="fas fa-map-pin"></i> 穴位展示
      </button>
      <button class="bottom-action-btn" onclick="enterSimulationTraining()">
        <i class="fas fa-syringe"></i> 模拟实训
      </button>
      <button class="bottom-action-btn" onclick="runSmartAnalysis()">
        <i class="fas fa-chart-line"></i> 智能分析
      </button>
    </div>

    <script>
      // ------------------- Unity 配置 ---------------------
      const buildUrl = './Build'
      const loaderUrl = `${buildUrl}/text.loader.js`
      const unityConfig = {
        dataUrl: `${buildUrl}/text.data`,
        frameworkUrl: `${buildUrl}/text.framework.js`,
        codeUrl: `${buildUrl}/text.wasm`,
        streamingAssetsUrl: 'StreamingAssets',
        companyName: 'XinglinLab',
        productName: 'GestureUnityControl',
        productVersion: '1.0',
        matchWebGLToCanvasSize: true,
        devicePixelRatio: 1,
      }

      // 参数与状态
      const MIN_TWO_HAND_DISTANCE = 0.18
      const PINCH_THRESHOLD = 0.055
      const CLICK_MOVE_THRESHOLD = 6
      const COMMAND_ENTER_HOLD_MS = 500
      const COMMAND_ENTER_STABLE_THRESHOLD = 0.025
      const COMMAND_TOGGLE_COOLDOWN_MS = 800
      const COMMAND_CURSOR_GAIN_X = 2400
      const COMMAND_CURSOR_GAIN_Y = 2000
      const COMMAND_CURSOR_SMOOTH = 0.22
      const SIM_CURSOR_SMOOTH = 0.18
      const SIM_PINCH_FILTER = 0.22
      const SIM_MAX_STEP_PX = 22
      const SIM_POSITION_DEADZONE_PX = 2.5
      const SIM_ACTIVATE_STABLE_FRAMES = 3

      let appState = {
        unityInstance: null,
        unityReady: false,
        currentInputMode: 'hand',
        hands: null,
        isProcessing: false,
        animationId: null,
        lastVideoTime: -1,
        isSendingToHands: false,
        videoReady: false,
        cameraStream: null,
        interactionMode: 'free',
        commandEnterHoldStart: 0,
        commandEnterRef: null,
        commandToggleCooldownUntil: 0,
        commandCursorX: window.innerWidth / 2,
        commandCursorY: window.innerHeight / 2,
        commandPalmReference: null,
        commandCursorBase: null,
        isSimulationMode: false,
        simulationPinchActive: false,
        simulationCursorX: window.innerWidth / 2,
        simulationCursorY: window.innerHeight / 2,
        filteredPinchX: null,
        filteredPinchY: null,
        simulationStableFrames: 0,
        mouseLeftDown: false,
        mouseLastX: 0,
        mouseDownX: 0,
        mouseDownY: 0,
        mouseDragDistance: 0,
        handRotationActive: false,
        handZoomActive: false,
        handRefX: null,
        handRefDist: null,
      }

      const el = {
        video: document.querySelector('.input_video'),
        canvas: document.querySelector('.output_canvas'),
        detectStatus: document.getElementById('detect-status'),
        videoStatus: document.getElementById('video-status'),
        modeBadge: document.getElementById('mode-badge'),
        commandStatus: document.getElementById('command-status'),
        cameraOffsetStatus: document.getElementById('camera-offset-status'),
        commandOverlay: document.getElementById('command-overlay'),
        commandOverlayTitle: document.getElementById('command-overlay-title'),
        commandOverlayText: document.getElementById('command-overlay-text'),
        gestureCursor: document.getElementById('gesture-cursor'),
        inputSourceStatus: document.getElementById('input-source-status'),
        mouseTipArea: document.getElementById('mouse-tip-area'),
        hintText: document.querySelector('.hint'),
        previewPanel: document.querySelector('.preview-wrap'),
        modelInfoContent: document.getElementById('model-info-content'),
        unityStatus: document.getElementById('unity-status'),
        loadingOverlay: document.getElementById('loading-overlay'),
        progressFill: document.getElementById('progress-fill'),
        messageContent: document.getElementById('message-content'),
        modelInfoHeader: document.getElementById('model-info-header'),
      }
      const canvasCtx = el.canvas.getContext('2d')

      function addMessage(msg) {
        let d = document.createElement('div')
        d.innerHTML = `<i class="fas fa-feather-alt" style="margin-right:6px;"></i>${msg}`
        el.messageContent.appendChild(d)
        d.scrollIntoView({ block: 'nearest' })
        while (el.messageContent.children.length > 12)
          el.messageContent.removeChild(el.messageContent.firstChild)
      }
      function isUnityReady() {
        return !!(appState.unityInstance && appState.unityReady)
      }
      function sendToUnity(method, val) {
        if (!isUnityReady()) return false
        try {
          appState.unityInstance.SendMessage(
            'ModelController',
            method,
            val === undefined ? '' : val,
          )
          return true
        } catch (e) {
          return false
        }
      }
      function updateCursorVisual(x, y, vis) {
        if (!vis) {
          el.gestureCursor.classList.remove('active')
          return
        }
        el.gestureCursor.classList.add('active')
        el.gestureCursor.style.left = `${x}px`
        el.gestureCursor.style.top = `${y}px`
      }
      function setCommandStatus(txt) {
        el.commandStatus.innerText = txt
      }
      function showCommandOverlay(title, text) {
        el.commandOverlayTitle.innerHTML = `<i class="fas fa-hand-fist"></i> ${title}`
        el.commandOverlayText.innerText = text
        el.commandOverlay.classList.add('active')
      }
      function hideCommandOverlay() {
        el.commandOverlay.classList.remove('active')
      }
      function exitCommandMode(showMsg = true) {
        appState.interactionMode = 'free'
        appState.commandEnterHoldStart = 0
        appState.commandEnterRef = null
        appState.commandPalmReference = null
        appState.commandCursorBase = null
        sendToUnity('ClearCursorState')
        setCommandStatus('自由模式')
        hideCommandOverlay()
        if (showMsg) addMessage('退出点击模式')
      }
      function exitSimulationTraining(showMsg = true) {
        if (!appState.isSimulationMode && !appState.simulationPinchActive) return
        appState.isSimulationMode = false
        appState.simulationPinchActive = false
        appState.filteredPinchX = appState.filteredPinchY = null
        updateCursorVisual(0, 0, false)
        sendToUnity('SetNeedleVisible', '0')
        sendToUnity('ExitSimulationMode')
        if (showMsg) addMessage('已退出模拟实训模式')
      }
      function resetSimulationFilterState() {
        appState.filteredPinchX = null
        appState.filteredPinchY = null
        appState.simulationStableFrames = 0
      }
      function renderModelInfo(data) {
        if (!data || typeof data != 'object') {
          el.modelInfoContent.innerHTML =
            '<div class="model-info-empty"><i class="fas fa-info-circle"></i> 无数据</div>'
          return
        }
        if (data.displayMode === 'simulation') {
          el.modelInfoHeader.innerHTML = '<i class="fas fa-laptop-medical"></i> 模拟实训·病例'
          el.modelInfoContent.innerHTML = `<div class="model-info-title"><i class="fas fa-stethoscope"></i> ${escapeHtml(data.panelTitle || '模拟实训')}</div><div class="model-info-item"><div class="model-info-label">病案分析</div><div class="model-info-value">${escapeHtml(data.extra || '请移动持针至穴位')}</div></div>`
          return
        }
        el.modelInfoHeader.innerHTML = '<i class="fas fa-notes-medical"></i> 经络腧穴·智析'
        let title = escapeHtml(data.title || data.id || '腧穴')
        let items = []
        for (let [k, l] of [
          ['meridian', '归经'],
          ['location', '位置'],
          ['method', '操作'],
          ['description', '释义'],
        ])
          if (data[k])
            items.push(
              `<div class="model-info-item"><div class="model-info-label">${l}</div><div class="model-info-value">${escapeHtml(data[k])}</div></div>`,
            )
        el.modelInfoContent.innerHTML = `<div class="model-info-title"><i class="fas fa-dharmachakra"></i> ${title}</div>${items.join('') || '<div class="model-info-empty">暂无详情</div>'}`
      }
      function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>]/g, function (m) {
          if (m === '&') return '&amp;'
          if (m === '<') return '&lt;'
          if (m === '>') return '&gt;'
          return m
        })
      }

      // 手势核心逻辑 (保留原有逻辑，只增加样式联动)
      function isValidHand(h) {
        return Array.isArray(h) && h.length >= 21
      }
      function hasPoint(h, i) {
        return isValidHand(h) && h[i] && typeof h[i].x === 'number'
      }
      function dist2(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y)
      }
      function getPalmCenter(h) {
        let idxs = [0, 1, 5, 9, 13],
          sx = 0,
          sy = 0,
          c = 0
        for (let i of idxs)
          if (hasPoint(h, i)) {
            sx += h[i].x
            sy += h[i].y
            c++
          }
        return c >= 5 ? { x: sx / c, y: sy / c } : null
      }
      function isFist(h) {
        let tips = [8, 12, 16, 20],
          pips = [6, 10, 14, 18],
          closed = 0
        for (let i = 0; i < tips.length; i++)
          if (
            hasPoint(h, tips[i]) &&
            hasPoint(h, pips[i]) &&
            hasPoint(h, 0) &&
            dist2(h[tips[i]], h[0]) < dist2(h[pips[i]], h[0]) * 1.18
          )
            closed++
        return closed >= 3
      }
      function getTwoPalmCenters(hl) {
        if (hl.length < 2) return null
        let cs = hl.map(getPalmCenter).filter(Boolean)
        if (cs.length < 2) return null
        cs.sort((a, b) => a.x - b.x)
        return [cs[0], cs[1]]
      }
      function pickSinglePalmCenter(hl) {
        for (let h of hl) {
          let c = getPalmCenter(h)
          if (c) return c
        }
        return null
      }
      function getPinchNeedlePoint(h) {
        if (!hasPoint(h, 4) || !hasPoint(h, 8) || !hasPoint(h, 12)) return null
        let thumb = h[4],
          index = h[8],
          middle = h[12]
        if (
          dist2(thumb, index) <= PINCH_THRESHOLD &&
          dist2(thumb, middle) <= PINCH_THRESHOLD &&
          dist2(index, middle) <= PINCH_THRESHOLD
        )
          return { x: (thumb.x + index.x + middle.x) / 3, y: (thumb.y + index.y + middle.y) / 3 }
        return null
      }

      function handleCommandToggleGesture(now, handList) {
        if (appState.currentInputMode !== 'hand') return false
        let pair = getTwoPalmCenters(handList)
        let twoFists = handList.length >= 2 && isFist(handList[0]) && isFist(handList[1])
        if (!(pair && twoFists)) {
          appState.commandEnterRef = null
          appState.commandEnterHoldStart = 0
          return false
        }
        let [c1, c2] = pair
        if (!appState.commandEnterRef) {
          appState.commandEnterRef = { c1: { x: c1.x, y: c1.y }, c2: { x: c2.x, y: c2.y } }
          appState.commandEnterHoldStart = now
          return false
        }
        let d1 = Math.hypot(
          c1.x - appState.commandEnterRef.c1.x,
          c1.y - appState.commandEnterRef.c1.y,
        )
        let d2 = Math.hypot(
          c2.x - appState.commandEnterRef.c2.x,
          c2.y - appState.commandEnterRef.c2.y,
        )
        let held = now - appState.commandEnterHoldStart >= COMMAND_ENTER_HOLD_MS
        let cooled = now >= appState.commandToggleCooldownUntil
        if (
          d1 > COMMAND_ENTER_STABLE_THRESHOLD ||
          d2 > COMMAND_ENTER_STABLE_THRESHOLD ||
          !held ||
          !cooled
        )
          return false
        appState.commandToggleCooldownUntil = now + COMMAND_TOGGLE_COOLDOWN_MS
        appState.commandEnterRef = null
        appState.commandEnterHoldStart = 0
        if (appState.interactionMode === 'free') {
          appState.interactionMode = 'command'
          appState.commandPalmReference = null
          appState.commandCursorBase = null
          setCommandStatus('点击模式')
          showCommandOverlay('点击模式已开启', '单手掌心移动光标，悬停选择')
          addMessage('进入手势点击模式')
        } else exitCommandMode()
        return true
      }

      function onHandResults(results) {
        if (appState.currentInputMode !== 'hand') return
        let w = el.video.videoWidth,
          h = el.video.videoHeight
        if (!w || !h) return
        let handList = (results.multiHandLandmarks || []).filter(isValidHand)
        el.canvas.width = w
        el.canvas.height = h
        canvasCtx.clearRect(0, 0, w, h)
        if (results.image) canvasCtx.drawImage(results.image, 0, 0, w, h)
        for (let hand of handList) {
          drawConnectors(canvasCtx, hand, HAND_CONNECTIONS, { color: '#c28a5c', lineWidth: 2.5 })
          drawLandmarks(canvasCtx, hand, { color: '#bc5a4c', lineWidth: 1.8 })
        }
        let now = performance.now()
        if (handleCommandToggleGesture(now, handList)) return
        if (appState.isSimulationMode) {
          let pinch = null
          for (let h of handList) if ((pinch = getPinchNeedlePoint(h))) break
          if (!pinch) {
            if (appState.simulationPinchActive) {
              appState.simulationPinchActive = false
              sendToUnity('SetNeedleVisible', '0')
              updateCursorVisual(0, 0, false)
            }
            resetSimulationFilterState()
            el.detectStatus.innerText = '模拟实训：三指聚拢持针'
            return
          }
          let sp = {
            x:
              appState.filteredPinchX === null
                ? pinch.x
                : (appState.filteredPinchX +=
                    (pinch.x - appState.filteredPinchX) * SIM_PINCH_FILTER),
            y:
              appState.filteredPinchY === null
                ? pinch.y
                : (appState.filteredPinchY +=
                    (pinch.y - appState.filteredPinchY) * SIM_PINCH_FILTER),
          }
          appState.filteredPinchX = sp.x
          appState.filteredPinchY = sp.y
          appState.simulationStableFrames++
          let sx = (1 - sp.x) * window.innerWidth,
            sy = sp.y * window.innerHeight
          if (
            !appState.simulationPinchActive &&
            appState.simulationStableFrames >= SIM_ACTIVATE_STABLE_FRAMES
          ) {
            appState.simulationPinchActive = true
            appState.simulationCursorX = sx
            appState.simulationCursorY = sy
          }
          if (!appState.simulationPinchActive) {
            updateCursorVisual(0, 0, false)
            sendToUnity('SetNeedleVisible', '0')
            return
          }
          let dx = sx - appState.simulationCursorX,
            dy = sy - appState.simulationCursorY
          let len = Math.hypot(dx, dy)
          if (len > SIM_MAX_STEP_PX) {
            dx *= SIM_MAX_STEP_PX / len
            dy *= SIM_MAX_STEP_PX / len
          }
          if (Math.abs(dx) > SIM_POSITION_DEADZONE_PX)
            appState.simulationCursorX += dx * SIM_CURSOR_SMOOTH
          if (Math.abs(dy) > SIM_POSITION_DEADZONE_PX)
            appState.simulationCursorY += dy * SIM_CURSOR_SMOOTH
          appState.simulationCursorX = Math.min(
            window.innerWidth,
            Math.max(0, appState.simulationCursorX),
          )
          appState.simulationCursorY = Math.min(
            window.innerHeight,
            Math.max(0, appState.simulationCursorY),
          )
          sendToUnity(
            'SetCursorPosition',
            `${appState.simulationCursorX.toFixed(1)},${appState.simulationCursorY.toFixed(1)}`,
          )
          sendToUnity(
            'SetNeedleScreenPosition',
            `${appState.simulationCursorX.toFixed(1)},${appState.simulationCursorY.toFixed(1)}`,
          )
          sendToUnity('SetNeedleVisible', '1')
          updateCursorVisual(appState.simulationCursorX, appState.simulationCursorY, true)
          el.detectStatus.innerText = '持针行针·实训中'
          return
        }
        if (appState.interactionMode === 'command') {
          let palm = pickSinglePalmCenter(handList)
          if (!palm) {
            el.detectStatus.innerText = '点击模式：未检测手掌'
            return
          }
          if (!appState.commandPalmReference) {
            appState.commandPalmReference = { x: palm.x, y: palm.y }
            appState.commandCursorBase = { x: appState.commandCursorX, y: appState.commandCursorY }
          }
          let offX = palm.x - appState.commandPalmReference.x,
            offY = palm.y - appState.commandPalmReference.y
          let tx = appState.commandCursorBase.x - offX * COMMAND_CURSOR_GAIN_X,
            ty = appState.commandCursorBase.y + offY * COMMAND_CURSOR_GAIN_Y
          appState.commandCursorX += (tx - appState.commandCursorX) * COMMAND_CURSOR_SMOOTH
          appState.commandCursorY += (ty - appState.commandCursorY) * COMMAND_CURSOR_SMOOTH
          appState.commandCursorX = Math.min(
            window.innerWidth,
            Math.max(0, appState.commandCursorX),
          )
          appState.commandCursorY = Math.min(
            window.innerHeight,
            Math.max(0, appState.commandCursorY),
          )
          sendToUnity(
            'SetCursorPosition',
            `${appState.commandCursorX.toFixed(1)},${appState.commandCursorY.toFixed(1)}`,
          )
          updateCursorVisual(appState.commandCursorX, appState.commandCursorY, true)
          el.detectStatus.innerText = '点击模式光标移动'
          return
        }
        // free
        if (handList.length >= 2) {
          let cen = getTwoPalmCenters(handList)
          if (cen) {
            let d = dist2(cen[0], cen[1]),
              cy = (cen[0].y + cen[1].y) / 2
            sendToUnity('SetHandsCenterY', cy.toFixed(4))
            if (d > MIN_TWO_HAND_DISTANCE) {
              if (!appState.handZoomActive) {
                appState.handZoomActive = true
                appState.handRefDist = d
              } else {
                let delta = d - appState.handRefDist
                if (Math.abs(delta) > 0.008)
                  sendToUnity(
                    'SetZoomDelta',
                    (Math.max(-0.03, Math.min(0.03, delta)) * 1.2).toFixed(4),
                  )
                appState.handRefDist = d
              }
              appState.handRotationActive = false
              sendToUnity('SetRotateDelta', '0')
              el.detectStatus.innerText = `双手缩放 | 偏移:${((1 - cy) * 100).toFixed(0)}%`
            } else {
              appState.handZoomActive = false
            }
          }
          return
        }
        if (handList.length === 1) {
          let palm = getPalmCenter(handList[0])
          if (palm) {
            let nx = 1 - palm.x
            if (!appState.handRotationActive) {
              appState.handRotationActive = true
              appState.handRefX = nx
            } else {
              let dx = nx - appState.handRefX
              sendToUnity('SetRotateDelta', (dx * 1.6).toFixed(4))
              appState.handRefX = nx
            }
          }
          el.detectStatus.innerText = '单手旋转中'
          return
        }
        appState.handRotationActive = false
        appState.handZoomActive = false
        sendToUnity('SetRotateDelta', '0')
        el.detectStatus.innerText = '未检测到手'
      }

      async function startCameraMode() {
        if (appState.currentInputMode !== 'hand') {
          addMessage('鼠标模式无需摄像头')
          return
        }
        stopProcessing()
        if (appState.cameraStream) stopCameraMode()
        try {
          let stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user' },
            audio: false,
          })
          appState.cameraStream = stream
          el.video.srcObject = stream
          el.video.onloadedmetadata = () => {
            el.video.play()
            appState.videoReady = true
            el.videoStatus.innerText = '已就绪'
            addMessage('摄像头已就绪')
          }
        } catch (e) {
          el.videoStatus.innerText = '失败'
          addMessage('摄像头错误')
        }
      }
      function stopCameraMode() {
        if (appState.cameraStream) {
          appState.cameraStream.getTracks().forEach((t) => t.stop())
          appState.cameraStream = null
        }
        el.video.srcObject = null
        appState.videoReady = false
        el.videoStatus.innerText = '已关闭'
      }
      function startProcessing() {
        if (appState.currentInputMode === 'mouse') {
          addMessage('鼠标模式直接控制')
          return
        }
        if (!el.video.srcObject) {
          addMessage('请先打开摄像头')
          return
        }
        if (!appState.hands) {
          if (typeof Hands === 'undefined') {
            addMessage('MediaPipe加载失败')
            return
          }
          appState.hands = new Hands({ locateFile: (f) => `./mediapipe/${f}` })
          appState.hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
          })
          appState.hands.onResults(onHandResults)
        }
        if (!appState.videoReady) {
          addMessage('摄像头未就绪')
          return
        }
        stopProcessing()
        appState.isProcessing = true
        const loop = () => {
          if (!appState.isProcessing || appState.currentInputMode !== 'hand') return
          requestAnimationFrame(loop)
          if (
            appState.videoReady &&
            el.video.currentTime !== appState.lastVideoTime &&
            !appState.isSendingToHands
          ) {
            appState.lastVideoTime = el.video.currentTime
            appState.isSendingToHands = true
            appState.hands.send({ image: el.video }).finally(() => {
              appState.isSendingToHands = false
            })
          }
        }
        loop()
        el.detectStatus.innerText = '手势识别运行中'
      }
      function stopProcessing() {
        appState.isProcessing = false
        if (appState.animationId) cancelAnimationFrame(appState.animationId)
        appState.animationId = null
        el.detectStatus.innerText = appState.currentInputMode === 'hand' ? '已停止' : '鼠标模式'
      }
      function resetUnityView() {
        sendToUnity('ResetView')
        addMessage('重置模型视图')
      }
      function showAcupointMode() {
        exitSimulationTraining(false)
        sendToUnity('ExitQuizMode')
        addMessage('穴位展示模式')
      }
      function enterSimulationTraining() {
        if (!isUnityReady()) {
          addMessage('Unity未就绪')
          return
        }
        exitCommandMode(false)
        appState.isSimulationMode = true
        appState.simulationPinchActive = false
        resetSimulationFilterState()
        updateCursorVisual(0, 0, false)
        sendToUnity('ExitQuizMode')
        sendToUnity('EnterSimulationMode')
        el.modelInfoHeader.innerHTML = '<i class="fas fa-syringe"></i> 模拟实训·针道'
        el.modelInfoContent.innerHTML =
          '<div class="model-info-title"><i class="fas fa-spa"></i> 持针训练</div><div class="model-info-item">请将三指聚拢模拟进针</div>'
        addMessage('进入模拟实训模式')
      }
      function runSmartAnalysis() {
        addMessage('智能分析：待接入AI辨证模块')
      }
      function setInputMode(mode) {
        appState.currentInputMode = mode
        let hand = mode === 'hand'
        document.getElementById('mode-hand').classList.toggle('active', hand)
        document.getElementById('mode-mouse').classList.toggle('active', !hand)
        el.modeBadge.innerText = hand ? '手势模式' : '鼠标模式'
        el.inputSourceStatus.innerText = hand ? '手势识别 (MediaPipe)' : '鼠标模拟手势'
        el.mouseTipArea.style.display = hand ? 'none' : 'block'
        el.previewPanel.style.display = hand ? 'block' : 'none'
        if (!hand) {
          stopProcessing()
        } else {
          if (appState.videoReady) startProcessing()
        }
        addMessage(`已切换至${hand ? '手势识别' : '鼠标控制'}模式`)
      }

      function initMouseControls() {
        window.addEventListener('mousemove', (e) => {
          if (appState.currentInputMode !== 'mouse') return
          if (appState.mouseLeftDown) {
            let dx = e.clientX - appState.mouseLastX
            if (Math.abs(dx) > 0.25) sendToUnity('SetRotateDelta', (dx * 0.012).toFixed(4))
            appState.mouseLastX = e.clientX
          }
        })
        window.addEventListener('mousedown', (e) => {
          if (appState.currentInputMode !== 'mouse' || e.button !== 0) return
          appState.mouseDownX = e.clientX
          appState.mouseDownY = e.clientY
          appState.mouseDragDistance = 0
          appState.mouseLeftDown = true
          appState.mouseLastX = e.clientX
          e.preventDefault()
        })
        window.addEventListener('mouseup', (e) => {
          if (appState.currentInputMode !== 'mouse' || e.button !== 0) return
          let click = appState.mouseDragDistance <= CLICK_MOVE_THRESHOLD
          appState.mouseLeftDown = false
          sendToUnity('SetRotateDelta', '0')
          if (click)
            sendToUnity('PerformScreenClick', `${e.clientX.toFixed(1)},${e.clientY.toFixed(1)}`)
        })
        window.addEventListener('wheel', (e) => {
          if (appState.currentInputMode !== 'mouse') return
          e.preventDefault()
          let delta = Math.max(-0.05, Math.min(0.05, -e.deltaY * 0.0015))
          if (Math.abs(delta) > 0.0001) sendToUnity('SetZoomDelta', delta.toFixed(4))
          let normY = Math.min(1, Math.max(0, e.clientY / window.innerHeight))
          sendToUnity('SetCameraOffsetFromScreenY', normY.toFixed(4))
          el.cameraOffsetStatus.innerText = `${((1 - normY) * 100).toFixed(0)}%`
        })
        window.addEventListener('contextmenu', (e) => {
          if (appState.currentInputMode === 'mouse') e.preventDefault()
        })
      }

      function loadUnity() {
        let script = document.createElement('script')
        script.src = loaderUrl
        script.onload = () => {
          createUnityInstance(document.querySelector('#unity-canvas'), unityConfig, (progress) => {
            el.progressFill.style.width = `${progress * 100}%`
          })
            .then((instance) => {
              appState.unityInstance = instance
              window.unityInstance = instance
              el.loadingOverlay.style.display = 'none'
              el.unityStatus.innerText = '已就绪'
              addMessage('Unity杏林引擎已加载')
            })
            .catch((e) => {
              el.unityStatus.innerText = '加载失败'
              addMessage('Unity加载失败')
            })
        }
        document.body.appendChild(script)
      }
      window.onUnityReady = function () {
        appState.unityReady = true
        el.unityStatus.innerText = '已就绪'
        addMessage('Unity 已就绪')

        // 确保 unity 容器不产生滚动
        const container = document.getElementById('unity-container')
        if (container) {
          container.style.overflow = 'hidden'
          container.style.position = 'fixed'
        }
      }
      window.onUnityModelInfo = function (json) {
        try {
          let data = JSON.parse(json)
          renderModelInfo(data)
        } catch (e) {
          el.modelInfoContent.innerHTML = `<div class="model-info-item">原始数据: ${escapeHtml(json)}</div>`
        }
      }
      window.onUnityCursorPosition = function (x, y) {
        if (appState.isSimulationMode) return
        if (appState.interactionMode === 'command' && x > -1000 && y > -1000)
          updateCursorVisual(x, y, true)
        else updateCursorVisual(0, 0, false)
      }

      window.startCameraMode = startCameraMode
      window.stopCameraMode = stopCameraMode
      window.startProcessing = startProcessing
      window.stopProcessing = stopProcessing
      window.resetUnityView = resetUnityView
      window.showAcupointMode = showAcupointMode
      window.enterSimulationTraining = enterSimulationTraining
      window.runSmartAnalysis = runSmartAnalysis
      window.setInputMode = setInputMode
      window.onload = () => {
        loadUnity()
        initMouseControls()
        setInputMode('hand')
        addMessage('杏林灵枢·手势系统就绪')
      }
    </script>
  </body>
</html>
